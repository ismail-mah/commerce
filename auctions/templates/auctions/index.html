{% extends "auctions/layout.html" %}

{% block body %}
<div class="container">
        <h2>Active Listings</h2>
        <div class="row">
            {% for list in listings %}
                <div class="col-md-4 mb-4 d-flex">
                    <div class="card w-100">
                        <img src="{{ list.image_url }}" class="card-img-top" alt="{{ list.title }}">
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title">{{ list.title }}</h5>
                            <!-- <p class="card-text">{{ list.description }}</p> -->
                            <p class="card-text">Price: ${{ list.price }}</p>
                            <p class="text-muted"><i class="fas fa-clock"></i> {{ list.created_at }}</p>
                            {% if list.end_time %}
                                <p class="text-muted"><i class="fa fa-hourglass-end"></i> Ends at: {{ list.end_time }}</p>
                            {% endif %}
                            <a href="#" class="btn btn-primary mt-auto">View Listing</a>
                        </div>
                    </div>
                </div>
            {% endfor %}
        </div>

    </div>
{% endblock %}
