{% extends "auctions/layout.html" %}

{% block body %}

    <div class="container mt-4 py-4 register-container">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-white border-bottom py-3">
                <h4 class="mb-0">Register</h4>
            </div>
            <div class="card-body p-4">
                {% if message %}
                    <div class="alert alert-danger">{{ message }}</div>
                {% endif %}
            
                <form action="{% url 'register' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <input class="form-control" autofocus type="text" name="username" placeholder="Username">
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="email" name="email" placeholder="Email Address">
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="password" name="password" placeholder="Password">
                    </div>
                    <div class="mb-3">
                        <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
                    </div>
                    <input class="btn btn-primary w-100" type="submit" value="Register">
                </form>
            </div>
            <div class="card-footer bg-white text-center py-3">
                Already have an account? <a href="{% url 'login' %}">Log In here.</a>
            </div>
        </div>
    </div>
{% endblock %}
