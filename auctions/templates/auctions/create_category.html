{% extends "auctions/layout.html" %}

{% block title %}Create Category{% endblock %}

{% block body %}
    <h4 class="text-center my-4">{{ title }}</h4>

    <div class="row">
        <div class="col-md-6 col-lg-5 col-sm-12 mx-auto">
            <div class="card shadow-sm">
                <div class="card-body">
                    <form action="{% url 'create_category' %}" method="post" class="shadow p-4 rounded">
                        {% csrf_token %}
                        <div class="mb-3">
                            {{ form.name.label_tag }}
                            {{ form.name }}
                            {{ form.name.errors }}
                        </div>
                        <button class="btn btn-primary" type="submit">
                            <i class="bi bi-plus-lg me-1"></i>
                            Create Category
                        </button>

                    </form>
                </div>
            </div>
        </div>
    </div>

{% endblock  %}
